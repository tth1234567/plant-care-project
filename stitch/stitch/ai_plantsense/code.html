<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>PlantSense AI Diagnostic</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-fixed-variant": "#314c3f",
              "background": "#f8f9fa",
              "on-secondary": "#ffffff",
              "on-secondary-fixed-variant": "#314c42",
              "error-container": "#ffdad6",
              "on-primary-fixed-variant": "#274e3d",
              "outline": "#717973",
              "surface-tint": "#3f6653",
              "on-tertiary-container": "#8ead9d",
              "surface-container-low": "#f3f4f5",
              "on-background": "#191c1d",
              "error": "#ba1a1a",
              "inverse-on-surface": "#f0f1f2",
              "surface-container-lowest": "#ffffff",
              "on-primary-container": "#86af99",
              "secondary-fixed": "#cae9db",
              "on-tertiary": "#ffffff",
              "surface": "#f8f9fa",
              "tertiary": "#0f2b1f",
              "on-surface": "#191c1d",
              "on-secondary-container": "#4c685d",
              "secondary": "#486459",
              "primary": "#012d1d",
              "surface-container-highest": "#e1e3e4",
              "on-error-container": "#93000a",
              "tertiary-fixed": "#caead8",
              "secondary-container": "#c8e7d9",
              "surface-container": "#edeeef",
              "tertiary-fixed-dim": "#aecebc",
              "secondary-fixed-dim": "#afcdc0",
              "on-surface-variant": "#414844",
              "inverse-surface": "#2e3132",
              "primary-fixed": "#c1ecd4",
              "tertiary-container": "#254135",
              "on-error": "#ffffff",
              "inverse-primary": "#a5d0b9",
              "surface-dim": "#d9dadb",
              "surface-bright": "#f8f9fa",
              "on-primary-fixed": "#002114",
              "on-primary": "#ffffff",
              "surface-variant": "#e1e3e4",
              "outline-variant": "#c1c8c2",
              "primary-container": "#1b4332",
              "on-secondary-fixed": "#042018"
            },
            fontFamily: {
              "headline": ["Manrope", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #a5d0b9, transparent);
            box-shadow: 0 0 15px #a5d0b9;
            position: absolute;
            width: 100%;
            top: 0;
            animation: scan 3s ease-in-out infinite;
        }
        @keyframes scan {
            0%, 100% { top: 10%; opacity: 0; }
            50% { top: 90%; opacity: 1; }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .pulse-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary overflow-hidden font-body text-on-surface">
<!-- Camera Viewport Background -->
<div class="fixed inset-0 z-0">
<img alt="Close up of a plant leaf with spots" class="w-full h-full object-cover grayscale-[0.2]" data-alt="Close up of a plant leaf with brown spots for diagnosis" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC6qu0yDPF-ryi7V5GG3Sxo3vL1I0NefIwbLRZuVdu1QvIPUMECQrLQvxhEE4-I9SLky3uHlkZ8ZhLSvf3InkRk42M1f4aABlucDaXWzbsP1yTGeTZs2FyGQKHTxE76cLMPaGGyZfsBe674oFF4ERmKWrmSaoEUsON4L5E_yz06-IQ1tgpdMAYiSPiSixos892oZ-_zxagNLJbSPYr6dlWodG7koBP_2ABd8s2iAZqtB7zyALSiApxYbJQv3yYq_A9N-w1wAOWzOBs"/>
<div class="absolute inset-0 bg-gradient-to-b from-primary/40 via-transparent to-primary/60"></div>
</div>
<!-- Top Navigation (Shell Implementation) -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 w-full bg-transparent">
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">close</span>
</button>
<div class="glass-panel px-4 py-1.5 rounded-full flex items-center gap-2">
<div class="w-2 h-2 rounded-full bg-emerald-400 pulse-dot"></div>
<span class="text-xs font-bold text-white tracking-widest">AI LIVE</span>
</div>
<button class="w-10 h-10 rounded-full glass-panel flex items-center justify-center text-white active:scale-95 transition-transform">
<span class="material-symbols-outlined">flash_on</span>
</button>
</header>
<!-- Main Diagnostic Canvas -->
<main class="relative z-10 h-screen w-full flex flex-col items-center justify-center px-6">
<!-- Viewfinder Frame -->
<div class="relative w-full aspect-[3/4] max-w-sm rounded-[3rem] border-2 border-white/20 overflow-hidden shadow-2xl">
<!-- Scanning Laser -->
<div class="scanning-line"></div>
<!-- Corner Accents -->
<div class="absolute top-8 left-8 w-8 h-8 border-t-4 border-l-4 border-emerald-400 rounded-tl-lg"></div>
<div class="absolute top-8 right-8 w-8 h-8 border-t-4 border-r-4 border-emerald-400 rounded-tr-lg"></div>
<div class="absolute bottom-8 left-8 w-8 h-8 border-b-4 border-l-4 border-emerald-400 rounded-bl-lg"></div>
<div class="absolute bottom-8 right-8 w-8 h-8 border-b-4 border-r-4 border-emerald-400 rounded-br-lg"></div>
<!-- Floating AI Analysis Bubbles -->
<div class="absolute top-1/4 left-10">
<div class="glass-panel px-3 py-2 rounded-xl flex items-center gap-2 animate-bounce">
<span class="material-symbols-outlined text-emerald-300 text-sm">filter_center_focus</span>
<span class="text-[10px] font-bold text-white uppercase tracking-tighter">Identifying Species...</span>
</div>
</div>
<div class="absolute top-1/2 right-6">
<div class="glass-panel px-3 py-2 rounded-xl flex items-center gap-2" style="animation: pulse 3s infinite;">
<span class="material-symbols-outlined text-emerald-300 text-sm">magnification_small</span>
<span class="text-[10px] font-bold text-white uppercase tracking-tighter">Scanning for Pests...</span>
</div>
</div>
<!-- Target Locked Indicator -->
<div class="absolute top-[60%] left-[45%] flex flex-col items-center">
<div class="w-16 h-16 rounded-full border border-dashed border-emerald-400/60 flex items-center justify-center animate-spin" style="animation-duration: 10s;"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2">
<div class="w-2 h-2 bg-emerald-400 rounded-full shadow-[0_0_10px_#34d399]"></div>
</div>
<div class="mt-4 glass-panel px-2 py-1 rounded-md">
<span class="text-[9px] text-emerald-200 font-bold tracking-widest uppercase">Anomaly Detected</span>
</div>
</div>
</div>
<!-- Guidance Message -->
<div class="mt-12 text-center max-w-xs">
<div class="inline-flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-emerald-400 text-lg">info</span>
<span class="text-white/90 text-sm font-semibold tracking-tight">AI Analysis in Progress</span>
</div>
<p class="text-white/60 text-xs leading-relaxed">
                Keep the camera focused on the affected area. Avoid shaky movements for a more precise diagnosis.
            </p>
</div>
<!-- Controls Area -->
<div class="absolute bottom-12 w-full px-12 flex justify-between items-center">
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-2xl glass-panel flex items-center justify-center text-white/70">
<span class="material-symbols-outlined">image</span>
</div>
<span class="text-[10px] text-white/50 font-bold uppercase tracking-widest">Gallery</span>
</div>
<!-- Shutter Button -->
<button class="relative group">
<div class="absolute inset-0 bg-emerald-400/20 blur-2xl rounded-full scale-150 opacity-50 group-active:opacity-100 transition-opacity"></div>
<div class="w-20 h-20 rounded-full border-4 border-white flex items-center justify-center p-1.5 transition-transform active:scale-90">
<div class="w-full h-full rounded-full bg-white shadow-inner"></div>
</div>
</button>
<div class="flex flex-col items-center gap-1">
<div class="w-12 h-12 rounded-2xl glass-panel flex items-center justify-center text-white/70">
<span class="material-symbols-outlined">history</span>
</div>
<span class="text-[10px] text-white/50 font-bold uppercase tracking-widest">Records</span>
</div>
</div>
</main>
<!-- Navigation suppression as per instructions: Focused task -->
<!-- Decorative Edge Vignette -->
<div class="fixed inset-0 pointer-events-none shadow-[inset_0_0_150px_rgba(1,45,29,0.8)] z-20"></div>
</body></html>
